<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Jimmy Stock Terminal V3</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Jimmy Stock Terminal V3</h1>
      <p id="now">更新中...</p>
    </div>
    <button id="refreshBtn">刷新</button>
  </header>

  <main>
    <section class="hero card">
      <div class="score" id="riskScore">--</div>
      <div>
        <h2 id="riskTitle">讀取風險</h2>
        <p id="riskText">V3：一頁看外資、期貨、匯率、融資、權值、ETF、持股。</p>
      </div>
    </section>

    <section class="grid2">
      <div class="card">
        <h3>總體風險燈號</h3>
        <table>
          <tbody id="macroTable"></tbody>
        </table>
      </div>
      <div class="card">
        <h3>盤勢結論</h3>
        <div id="summaryBox" class="summary"></div>
      </div>
    </section>

    <section class="card">
      <h3>全球 AI / 半導體雷達</h3>
      <table>
        <thead><tr><th>項目</th><th>價格</th><th>漲跌%</th><th>判斷</th></tr></thead>
        <tbody id="globalTable"></tbody>
      </table>
    </section>

    <section class="card">
      <h3>權值股雷達</h3>
      <table>
        <thead><tr><th>代號</th><th>名稱</th><th>價格</th><th>漲跌%</th><th>燈號</th></tr></thead>
        <tbody id="megaTable"></tbody>
      </table>
    </section>

    <section class="card">
      <h3>ETF 底倉雷達</h3>
      <table>
        <thead><tr><th>代號</th><th>名稱</th><th>持股</th><th>配息/定位</th><th>追蹤頻率</th></tr></thead>
        <tbody id="etfTable"></tbody>
      </table>
    </section>

    <section class="card">
      <h3>中小型個股作戰表</h3>
      <table>
        <thead><tr><th>代號</th><th>名稱</th><th>持股</th><th>定位</th><th>今日動作</th></tr></thead>
        <tbody id="smallTable"></tbody>
      </table>
    </section>

    <section class="card">
      <h3>手動輸入區（盤後資料）</h3>
      <div class="inputs">
        <label>外資現貨億<input id="foreignCash" type="number" value="-1800"></label>
        <label>外資空單口<input id="foreignFutures" type="number" value="81000"></label>
        <label>融資餘額億<input id="marginBalance" type="number" value="6200"></label>
        <label>USD/TWD<input id="usdtwd" type="number" value="31.5" step="0.01"></label>
      </div>
      <button id="applyBtn" class="wide">套用手動數據</button>
    </section>
  </main>

  <footer>V3 免費版：盤中價格可能延遲；法人、融資、期貨以盤後/手動為準。</footer>
  <script src="script.js"></script>
</body>
</html>
